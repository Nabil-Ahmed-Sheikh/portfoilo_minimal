  <text x="20" y="40" fill="#6b7280" font-size="9" font-family="sans-serif">University of Calgary · Security Constrained OPF</text>
  <!-- Badges -->
  <rect x="590" y="12" width="68" height="22" rx="4" fill="#064e3b"/>
  <text x="624" y="27" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif" font-weight="600">R² = 0.94</text>
  <rect x="666" y="12" width="72" height="22" rx="4" fill="#1e3a5f"/>
  <text x="702" y="27" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif" font-weight="600">MAPE ~10%</text>
  <rect x="746" y="12" width="42" height="22" rx="4" fill="#292524"/>
  <text x="767" y="27" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="sans-serif" font-weight="600">13.6s</text>

  <!-- Left sidebar: stat cards -->
  <rect x="12" y="58" width="148" height="60" rx="5" fill="#1f2937"/>
  <text x="86" y="82" text-anchor="middle" fill="#f59e0b" font-size="26" font-family="sans-serif" font-weight="700">13.6s</text>
  <text x="86" y="108" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif" letter-spacing="1">SIM RUNTIME</text>

  <rect x="12" y="126" width="148" height="60" rx="5" fill="#1f2937"/>
  <text x="86" y="150" text-anchor="middle" fill="#34d399" font-size="26" font-family="sans-serif" font-weight="700">0.94</text>
  <text x="86" y="176" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif" letter-spacing="1">R² SCORE</text>

  <rect x="12" y="194" width="148" height="60" rx="5" fill="#1f2937"/>
  <text x="86" y="218" text-anchor="middle" fill="#93c5fd" font-size="26" font-family="sans-serif" font-weight="700">~10%</text>
  <text x="86" y="244" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif" letter-spacing="1">MAPE</text>

