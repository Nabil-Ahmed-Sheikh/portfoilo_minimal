<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Top nav bar -->
  <rect width="800" height="50" fill="#1e293b"/>
  <rect y="50" width="800" height="1" fill="#334155"/>
  <!-- Logo -->
  <rect x="20" y="15" width="20" height="20" rx="10" fill="#3b82f6"/>
  <text x="18" y="28" fill="#fff" font-size="12" font-family="sans-serif" font-weight="700">+</text>
  <text x="48" y="30" fill="#f1f5f9" font-size="14" font-family="sans-serif" font-weight="700">myHealth</text>
  <!-- Nav links -->
  <text x="170" y="30" fill="#94a3b8" font-size="11" font-family="sans-serif">Dashboard</text>
  <text x="260" y="30" fill="#3b82f6" font-size="11" font-family="sans-serif">Appointments</text>
  <text x="370" y="30" fill="#94a3b8" font-size="11" font-family="sans-serif">Prescriptions</text>
  <text x="470" y="30" fill="#94a3b8" font-size="11" font-family="sans-serif">Records</text>
  <!-- User chip -->
  <rect x="700" y="14" width="80" height="22" rx="11" fill="#334155"/>
  <circle cx="715" cy="25" r="7" fill="#475569"/>
  <text x="728" y="29" fill="#94a3b8" font-size="10" font-family="sans-serif">Dr. Chen</text>

  <!-- Left sidebar: patient card -->
  <rect x="16" y="62" width="210" height="372" rx="6" fill="#1e293b"/>
  <!-- Patient avatar ring -->
  <circle cx="121" cy="108" r="34" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="121" cy="108" r="28" fill="#334155"/>
  <text x="121" y="116" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="sans-serif">JD</text>
  <text x="121" y="158" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="sans-serif" font-weight="600">John Doe</text>
  <text x="121" y="174" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">ID #00142 · Age 34</text>
  <!-- Status dot -->
  <circle cx="104" cy="174" r="4" fill="#22c55e"/>

  <line x1="32" y1="188" x2="210" y2="188" stroke="#334155" stroke-width="1"/>

  <!-- Vitals section -->
  <text x="32" y="208" fill="#64748b" font-size="9" font-family="sans-serif" letter-spacing="2">VITALS</text>

  <!-- HR -->
  <text x="32" y="228" fill="#94a3b8" font-size="11" font-family="sans-serif">Heart Rate</text>
  <text x="206" y="228" text-anchor="end" fill="#3b82f6" font-size="13" font-family="sans-serif" font-weight="600">76 bpm</text>

  <!-- BP -->
  <text x="32" y="250" fill="#94a3b8" font-size="11" font-family="sans-serif">Blood Pressure</text>
  <text x="206" y="250" text-anchor="end" fill="#22c55e" font-size="13" font-family="sans-serif" font-weight="600">120/80</text>

  <!-- Temp -->
  <text x="32" y="272" fill="#94a3b8" font-size="11" font-family="sans-serif">Temperature</text>
  <text x="206" y="272" text-anchor="end" fill="#f1f5f9" font-size="13" font-family="sans-serif" font-weight="600">98.6°F</text>

  <!-- O2 -->
  <text x="32" y="294" fill="#94a3b8" font-size="11" font-family="sans-serif">O₂ Saturation</text>
  <text x="206" y="294" text-anchor="end" fill="#22c55e" font-size="13" font-family="sans-serif" font-weight="600">98%</text>

  <line x1="32" y1="308" x2="210" y2="308" stroke="#334155" stroke-width="1"/>

  <!-- Next appointment -->
  <text x="32" y="328" fill="#64748b" font-size="9" font-family="sans-serif" letter-spacing="2">NEXT APPOINTMENT</text>
  <text x="32" y="348" fill="#f1f5f9" font-size="11" font-family="sans-serif" font-weight="500">Dr. Sarah Chen</text>
  <text x="32" y="364" fill="#64748b" font-size="10" font-family="sans-serif">Cardiology · 2:30 PM</text>
  <rect x="32" y="376" width="80" height="22" rx="4" fill="#1d4ed8"/>
  <text x="72" y="391" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif">Join Call →</text>

  <!-- HIPAA badge -->
  <rect x="32" y="410" width="160" height="20" rx="3" fill="#166534"/>
  <text x="112" y="424" text-anchor="middle" fill="#bbf7d0" font-size="9" font-family="sans-serif" letter-spacing="1">HIPAA COMPLIANT</text>

  <!-- Main area: heart rate chart -->
  <rect x="240" y="62" width="544" height="196" rx="6" fill="#1e293b"/>
  <text x="260" y="90" fill="#f1f5f9" font-size="13" font-family="sans-serif" font-weight="600">Heart Rate Monitor</text>
  <text x="260" y="106" fill="#64748b" font-size="10" font-family="sans-serif">Last 24 hours · Live</text>
  <circle cx="750" cy="86" r="5" fill="#22c55e"/>
  <text x="742" y="90" text-anchor="end" fill="#22c55e" font-size="10" font-family="sans-serif">LIVE</text>

  <!-- Chart grid -->
  <line x1="260" y1="130" x2="764" y2="130" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="260" y1="155" x2="764" y2="155" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="260" y1="180" x2="764" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="260" y1="205" x2="764" y2="205" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="256" y="134" text-anchor="end" fill="#475569" font-size="9" font-family="sans-serif">110</text>
  <text x="256" y="159" text-anchor="end" fill="#475569" font-size="9" font-family="sans-serif">90</text>
  <text x="256" y="184" text-anchor="end" fill="#475569" font-size="9" font-family="sans-serif">70</text>
  <text x="256" y="209" text-anchor="end" fill="#475569" font-size="9" font-family="sans-serif">50</text>

  <!-- ECG-style waveform -->
  <polyline
    points="260,172 290,172 298,152 302,192 306,132 310,192 314,172 350,172 358,152 362,192 366,132 370,192 374,172 410,172 418,152 422,192 426,132 430,192 434,172 470,172 478,152 482,192 486,132 490,192 494,172 530,172 538,152 542,192 546,132 550,192 554,172 590,172 598,152 602,192 606,132 610,192 614,172 650,172 658,152 662,192 666,132 670,192 674,172 764,172"
    fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- Stats row -->
  <rect x="240" y="270" width="165" height="72" rx="6" fill="#1e293b"/>
  <text x="260" y="294" fill="#64748b" font-size="10" font-family="sans-serif">Active Patients</text>
  <text x="260" y="324" fill="#f1f5f9" font-size="30" font-family="sans-serif" font-weight="700">2,048</text>

  <rect x="416" y="270" width="165" height="72" rx="6" fill="#1e293b"/>
  <text x="436" y="294" fill="#64748b" font-size="10" font-family="sans-serif">Today's Appointments</text>
  <text x="436" y="324" fill="#3b82f6" font-size="30" font-family="sans-serif" font-weight="700">47</text>

  <rect x="592" y="270" width="192" height="72" rx="6" fill="#1e293b"/>
  <text x="612" y="294" fill="#64748b" font-size="10" font-family="sans-serif">Video Calls Active</text>
  <text x="612" y="324" fill="#22c55e" font-size="30" font-family="sans-serif" font-weight="700">12</text>
  <circle cx="660" cy="316" r="5" fill="#22c55e"/>

  <!-- Recent activity -->
  <rect x="240" y="354" width="544" height="80" rx="6" fill="#1e293b"/>
  <text x="260" y="376" fill="#64748b" font-size="9" font-family="sans-serif" letter-spacing="2">RECENT ACTIVITY</text>

  <circle cx="272" cy="400" r="9" fill="#334155"/>
  <text x="272" y="404" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="sans-serif">SC</text>
  <text x="290" y="396" fill="#f1f5f9" font-size="11" font-family="sans-serif">Dr. Sarah Chen started video call</text>
  <text x="290" y="412" fill="#64748b" font-size="10" font-family="sans-serif">2 min ago · Patient #00142</text>

  <circle cx="530" cy="400" r="9" fill="#334155"/>
  <text x="530" y="404" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="sans-serif">MJ</text>
  <text x="548" y="396" fill="#f1f5f9" font-size="11" font-family="sans-serif">New e-prescription issued</text>
  <text x="548" y="412" fill="#64748b" font-size="10" font-family="sans-serif">5 min ago · Patient #00138</text>
</svg>
